<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found — Coffee Circuit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body { background-color: ghostwhite; }
        .error-wrap { min-height: 100vh; }
        .error-code { font-size: 6rem; font-weight: 700; color: #5C87B2; line-height: 1; }
    </style>
</head>
<body>
    <div class="error-wrap d-flex flex-column justify-content-center align-items-center text-center px-3">
        <div class="error-code">404</div>
        <h1 class="h3 mt-3">Page not found</h1>
        <p class="text-muted mb-4" style="max-width: 480px;">
            The page you’re looking for doesn’t exist or may have been moved.
        </p>
        <a href="/" class="btn btn-primary px-4">Back to homepage</a>
    </div>
</body>
</html>
