{% extends 'base/main.html' %}
{% load static %}

{% block content %}
{% include "base/navbar_light.html" %}

<div style="background-color: #f8f9fa; min-height: 100vh;">
    <div class="container" style="padding-top: 120px; padding-bottom: 60px; padding-left: 80px; padding-right: 80px;">
        <a href="{% url 'resource_list' %}" style="color: #9DAD6F; text-decoration: none;">
            <i class="fas fa-arrow-left me-1"></i> Back to Resources
        </a>

        <h1 class="mt-4 mb-3" style="color: #303C50; font-weight: bold;">
            {{ resource.title }}
        </h1>

        <p class="text-muted mb-4">
            {{ resource.updated_at|date:"F j, Y" }}
        </p>

        {% if resource.cover_image %}
        <img src="{{ resource.cover_image.url }}" alt="{{ resource.title }}" class="img-fluid mb-4" style="max-height: 400px; width: 100%; object-fit: cover; border-radius: 8px;">
        {% endif %}

        <div class="resource-body" style="color: #333; font-size: 16px; line-height: 1.8;">
            {{ resource.body|safe }}
        </div>
    </div>
</div>
{% endblock %}
