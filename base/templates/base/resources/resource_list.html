{% extends 'base/main.html' %}
{% load static %}

{% block content %}
{% include "base/navbar_light.html" %}

<div style="background-color: #f8f9fa; min-height: 100vh;">
    <div class="container" style="padding-top: 120px; padding-bottom: 60px;">
        <h1 class="mb-4" style="color: #303C50; font-weight: bold;">Resources</h1>
        <p class="mb-5" style="color: #6c757d; font-size: 18px;">
            Articles and guides for coffee producers and roasters.
        </p>

        <div class="row">
            {% for resource in resources %}
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100 shadow-sm" style="border: none; border-radius: 8px;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" style="color: #303C50; font-weight: bold;">
                            {{ resource.title }}
                        </h5>
                        <p class="card-text mt-2" style="color: #6c757d;">
                            {{ resource.summary }}
                        </p>
                        <a href="{% url 'resource_detail' resource.slug %}"
                           class="btn mt-auto"
                           style="background-color: #9DAD6F; color: white; font-weight: 500;">
                            Read More
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
