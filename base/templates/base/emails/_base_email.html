{% load static %}<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0; padding:0; background-color:#f4f5f7; font-family:Arial, Helvetica, sans-serif; color:#333333;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7; padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px; background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e6e8eb;">
                    <!-- Logo header -->
                    <tr>
                        <td align="center" style="padding:28px 24px; border-bottom:1px solid #eef0f2;">
                            <img src="{% static 'image/LogoDarkText.png' %}" width="140" alt="Coffee Circuit" style="display:block; border:0; outline:none; text-decoration:none;">
                        </td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td style="padding:32px; font-size:15px; line-height:1.6; color:#333333;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 32px 28px 32px; border-top:1px solid #eef0f2; font-size:12px; line-height:1.5; color:#8a9099;">
                            <p style="margin:0 0 4px 0; font-weight:bold; color:#5C87B2;">Coffee Circuit</p>
                            <p style="margin:0;">Connecting coffee roasters with producers.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
