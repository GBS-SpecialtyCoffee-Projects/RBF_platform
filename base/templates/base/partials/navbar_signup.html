{% load static %}
{% comment %}
Minimal navbar for the signup / profile-completion flow: logo, translate,
and a "finish later" sign-out.
{% endcomment %}
<nav class="navbar navbar-dark d-flex justify-content-between align-items-center px-4">
    <div class="d-flex align-items-center">
        <img src="{% static 'image/LogoDarkText.png' %}" width="150px" alt="Coffee Circuit">
        <div class="ms-4" id="google_translate_element"></div>
    </div>
    <form method="post" action="{% url 'signout' %}"
          onsubmit="return confirm('Sign out? Any unsaved changes on this page will be lost. You can come back later to finish.');">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-dark fw-semibold">
            <i class="fa-solid fa-right-from-bracket me-2"></i>Finish later — Sign out
        </button>
    </form>
</nav>
<hr>
