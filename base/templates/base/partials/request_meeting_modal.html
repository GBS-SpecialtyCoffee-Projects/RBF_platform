{% comment %}
Shared "Connect" modal for profile pages. Posts to the generic request_meeting
endpoint, which handles the cap/duplicate checks and redirects back here.
Requires `target_user_id` in the include context.
{% endcomment %}
<div class="modal fade" id="requestMeetingModal" tabindex="-1" aria-labelledby="requestMeetingModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="requestMeetingModalLabel">Request Meeting</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="post" action="{% url 'request_meeting' target_user_id %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="requestMeetingMessage" class="form-label">Message/Notes</label>
                        <textarea class="form-control" id="requestMeetingMessage" name="message" placeholder="Enter your message here"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Send Request</button>
                </div>
            </form>
        </div>
    </div>
</div>
